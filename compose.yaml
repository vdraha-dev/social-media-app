services:
  app:
    build: .
    ports:
      - target: 8080
        published: 5001

    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080"]

    depends_on:
      - postgres

    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/appdb
      SYNC_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/appdb

    volumes:
      - ./alembic:/app/alembic

  migrations:
    build: .
    command: ["alembic", "upgrade", "head"]
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb

    ports:
      - target: 5432
        published: 5433

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
