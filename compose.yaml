x-app-base: &app-base
  build:
    context: .
  ports:
    - target: 8080
      published: "${APP_PORT}"
  depends_on:
    migrations:
      condition: service_completed_successfully
  environment:
    DATABASE_URL: "${DATABASE_URL}"
    SYNC_DATABASE_URL: "${SYNC_DATABASE_URL}"
  volumes:
    - .:/app
    - /app/.venv


services:
  app:
    build: .
    ports:
      - target: 8080
        published: 5001

    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080"]

    depends_on:
      migrations:
        condition: service_completed_successfully

    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/appdb
      SYNC_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/appdb

    volumes:
      - .:/app
      - venv_data:/app/.venv

  migrations:
    build: .

    command: ["alembic", "upgrade", "head"]

    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/appdb
      SYNC_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/appdb

    volumes:
      - .:/app
      - venv_data:/app/.venv

    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb

    ports:
      - target: 5432
        published: 5433

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  venv_data:
